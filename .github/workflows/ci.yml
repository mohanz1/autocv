name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_NO_SOURCES: "1"

jobs:
  lint-type:
    name: Lint and Type
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group lint --group type

      - name: Ruff Format
        run: uv run --no-sync --group lint ruff format --check .

      - name: Ruff Check
        run: uv run --no-sync --group lint ruff check . --output-format=github

      - name: Mypy
        run: uv run --no-sync --group type mypy

  test:
    name: ${{ matrix.job-name }}
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            job-name: Tests (Python 3.11)
            pytest-command: pytest -q tests
            upload-coverage: false
          - python-version: "3.12"
            job-name: Tests and Coverage (Python 3.12)
            pytest-command: pytest -q tests --cov=autocv --cov-config=pyproject.toml --cov-report=term --cov-report=xml
            upload-coverage: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group test

      - name: Pytest
        run: uv run --no-sync --group test ${{ matrix.pytest-command }}

      - name: Upload coverage artifact
        if: ${{ matrix.upload-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ matrix.upload-coverage }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group docs

      - name: Sphinx
        run: uv run --no-sync --group docs sphinx-build -W docs public/docs

      - name: Upload docs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: public/docs
          if-no-files-found: error
          retention-days: 7
